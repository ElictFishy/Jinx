name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # MAUI workloads aren't installed here — this builds the same
      # non-mobile solution the app's core logic ships in (see JinxApp.csproj,
      # which drops mobile targets when $(CI) is set).
      - name: Restore
        run: dotnet restore Jinx_SansMaui.slnx

      - name: Build
        run: dotnet build Jinx_SansMaui.slnx -c Release --no-restore

      - name: Test — Models
        run: dotnet test Tests/Models.Tests/Models.Tests.csproj -c Release --no-build

      - name: Test — Managers
        run: dotnet test Tests/Managers.Tests/Managers.Tests.csproj -c Release --no-build
